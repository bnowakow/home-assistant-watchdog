# ============================================================
# Spring Boot configuration
# ============================================================
spring.application.name=home-assistant-watchdog
spring.profiles.default=local
spring.docker.compose.enabled=false
spring.config.import=optional:file:.env[.properties]

# ============================================================
# Flyway migrations
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# Spring Data JDBC
# ============================================================
spring.sql.init.platform=postgresql

# ============================================================
# Security: Google OAuth2 client (UI login)
#
# Configure via Spring Boot's standard environment variables when enabling
# APP_SECURITY_ENABLED=true:
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
# ============================================================
app.security.enabled=${APP_SECURITY_ENABLED:false}
app.security.google-client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
app.security.google-client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
app.notifications.enabled=${APP_NOTIFICATIONS_ENABLED:false}
app.notifications.encryption-key=${APP_NOTIFICATIONS_ENCRYPTION_KEY:}
app.notifications.pushover.app-token=${APP_NOTIFICATIONS_PUSHOVER_APP_TOKEN:}
app.notifications.pushover.base-url=${APP_NOTIFICATIONS_PUSHOVER_BASE_URL:https://api.pushover.net}
app.notifications.pushover.connect-timeout=${APP_NOTIFICATIONS_PUSHOVER_CONNECT_TIMEOUT:3s}
app.notifications.pushover.read-timeout=${APP_NOTIFICATIONS_PUSHOVER_READ_TIMEOUT:5s}

# ============================================================
# Session cookie hardening for UI auth
# ============================================================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/
server.servlet.session.timeout=${SERVER_SERVLET_SESSION_TIMEOUT:30m}

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,metrics,info,env
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ============================================================
# Logging
# ============================================================
logging.level.org.apache.coyote.http11.Http11Processor=WARN
logging.level.pl.bnowakowski.watchdog=${APP_LOG_LEVEL:INFO}
logging.file.name=${APP_LOG_FILE:logs/home-assistant-watchdog.log}

# ============================================================
# Application build metadata
# ============================================================
app.build.timestamp=${appBuildTimestamp}
app.build.version=${appBuildVersion}
app.build.commit=${appBuildCommit}
info.app.name=${spring.application.name}
info.app.version=${app.build.version}
info.app.commit=${app.build.commit}
info.app.build-time=${app.build.timestamp}

# ============================================================
# Watchdog provider defaults
# ============================================================
watchdog.mqtt.enabled=${WATCHDOG_MQTT_ENABLED:true}
watchdog.mqtt.broker-uri=${WATCHDOG_MQTT_BROKER_URI:tcp://core-mosquitto:1883}
watchdog.mqtt.username=${WATCHDOG_MQTT_USERNAME:addons}
watchdog.mqtt.password=${WATCHDOG_MQTT_PASSWORD:}
watchdog.mqtt.client-id=${WATCHDOG_MQTT_CLIENT_ID:home-assistant-watchdog}
watchdog.mqtt.connection-timeout-seconds=${WATCHDOG_MQTT_CONNECTION_TIMEOUT_SECONDS:10}
watchdog.mqtt.keep-alive-seconds=${WATCHDOG_MQTT_KEEP_ALIVE_SECONDS:30}
watchdog.mqtt.reconnect-delay-seconds=${WATCHDOG_MQTT_RECONNECT_DELAY_SECONDS:30}
watchdog.zigbee2mqtt.base-topic=${WATCHDOG_ZIGBEE2MQTT_BASE_TOPIC:zigbee2mqtt-2}
watchdog.home-assistant.enabled=${WATCHDOG_HOME_ASSISTANT_ENABLED:false}
watchdog.home-assistant.base-url=${WATCHDOG_HOME_ASSISTANT_BASE_URL:https://home-assistant.localdomain.bnowakowski.pl:8123}
watchdog.home-assistant.token=${WATCHDOG_HOME_ASSISTANT_TOKEN:}
watchdog.home-assistant.connect-timeout=${WATCHDOG_HOME_ASSISTANT_CONNECT_TIMEOUT:3s}
watchdog.home-assistant.read-timeout=${WATCHDOG_HOME_ASSISTANT_READ_TIMEOUT:10s}
watchdog.home-assistant.skip-certificate-checks=${WATCHDOG_HOME_ASSISTANT_SKIP_CERTIFICATE_CHECKS:false}
# Optional explicit service-call mappings for advanced Home Assistant fixes.
# Example environment/property names:
# WATCHDOG_HOME_ASSISTANT_SERVICE_CALLS_0_PROPERTY_PATH=state
# WATCHDOG_HOME_ASSISTANT_SERVICE_CALLS_0_ENTITY_ID=climate.bedroom
# WATCHDOG_HOME_ASSISTANT_SERVICE_CALLS_0_DESIRED_VALUE=heat
# WATCHDOG_HOME_ASSISTANT_SERVICE_CALLS_0_DOMAIN=climate
# WATCHDOG_HOME_ASSISTANT_SERVICE_CALLS_0_SERVICE=set_hvac_mode

# ============================================================
# Watchdog runtime defaults
# ============================================================
watchdog.parameter-history.retention-days=${WATCHDOG_PARAMETER_HISTORY_RETENTION_DAYS:365}
watchdog.parameter-history.record-unchanged=${WATCHDOG_PARAMETER_HISTORY_RECORD_UNCHANGED:false}
watchdog.parameter-history.unchanged-sample-seconds=${WATCHDOG_PARAMETER_HISTORY_UNCHANGED_SAMPLE_SECONDS:86400}
watchdog.notifications.default-cooldown-seconds=${WATCHDOG_NOTIFICATION_DEFAULT_COOLDOWN_SECONDS:86400}
watchdog.fix.default-retry-count=${WATCHDOG_FIX_DEFAULT_RETRY_COUNT:3}
watchdog.fix.default-retry-delay-seconds=${WATCHDOG_FIX_DEFAULT_RETRY_DELAY_SECONDS:60}
watchdog.fix.default-cooldown-seconds=${WATCHDOG_FIX_DEFAULT_COOLDOWN_SECONDS:300}
watchdog.check.enabled=${WATCHDOG_CHECK_ENABLED:true}
watchdog.check.scheduled-enabled=${WATCHDOG_CHECK_SCHEDULED_ENABLED:${WATCHDOG_CHECK_ENABLED:true}}
watchdog.check.interval-seconds=${WATCHDOG_CHECK_INTERVAL_SECONDS:300}
watchdog.check.missing-property-retry-count=${WATCHDOG_MISSING_PROPERTY_RETRY_COUNT:3}
watchdog.check.missing-property-retry-delay-seconds=${WATCHDOG_MISSING_PROPERTY_RETRY_DELAY_SECONDS:10}
watchdog.check.stale-mains-seconds=${WATCHDOG_STALE_MAINS_SECONDS:7200}
watchdog.check.stale-battery-seconds=${WATCHDOG_STALE_BATTERY_SECONDS:86400}
watchdog.check.stale-critical-seconds=${WATCHDOG_STALE_CRITICAL_SECONDS:3600}
