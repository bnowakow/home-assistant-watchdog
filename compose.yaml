services:
  springboot:
    build:
      context: .
      args:
        APP_BUILD_COMMIT: '${APP_BUILD_COMMIT:-unknown}'
    image: home-assistant-watchdog:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - 'JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=25'
      - 'SPRING_PROFILES_ACTIVE=prod'
      - 'APP_SECURITY_ENABLED=${APP_SECURITY_ENABLED:-false}'
      - 'APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}'
      - 'JDBC_DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}'
      - 'JDBC_DATABASE_USERNAME=${POSTGRES_USER}'
      - 'JDBC_DATABASE_PASSWORD=${POSTGRES_PASSWORD}'
      - 'SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:-}'
      - 'SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:-}'
      - 'SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}'
      - 'SERVER_SERVLET_SESSION_TIMEOUT=${SERVER_SERVLET_SESSION_TIMEOUT:-30m}'
      - 'WATCHDOG_MQTT_ENABLED=${WATCHDOG_MQTT_ENABLED:-true}'
      - 'WATCHDOG_MQTT_BROKER_URI=${WATCHDOG_MQTT_BROKER_URI:-tcp://core-mosquitto:1883}'
      - 'WATCHDOG_MQTT_USERNAME=${WATCHDOG_MQTT_USERNAME:-addons}'
      - 'WATCHDOG_MQTT_PASSWORD=${WATCHDOG_MQTT_PASSWORD:-}'
      - 'WATCHDOG_ZIGBEE2MQTT_BASE_TOPIC=${WATCHDOG_ZIGBEE2MQTT_BASE_TOPIC:-zigbee2mqtt-2}'
      - 'WATCHDOG_HOME_ASSISTANT_ENABLED=${WATCHDOG_HOME_ASSISTANT_ENABLED:-false}'
      - 'WATCHDOG_HOME_ASSISTANT_BASE_URL=${WATCHDOG_HOME_ASSISTANT_BASE_URL:-https://home-assistant.localdomain.bnowakowski.pl:8123}'
      - 'WATCHDOG_HOME_ASSISTANT_TOKEN=${WATCHDOG_HOME_ASSISTANT_TOKEN:-}'
      - 'WATCHDOG_PARAMETER_HISTORY_RETENTION_DAYS=${WATCHDOG_PARAMETER_HISTORY_RETENTION_DAYS:-365}'
      - 'WATCHDOG_PARAMETER_HISTORY_RECORD_UNCHANGED=${WATCHDOG_PARAMETER_HISTORY_RECORD_UNCHANGED:-false}'
      - 'WATCHDOG_PARAMETER_HISTORY_UNCHANGED_SAMPLE_SECONDS=${WATCHDOG_PARAMETER_HISTORY_UNCHANGED_SAMPLE_SECONDS:-86400}'
      - 'WATCHDOG_NOTIFICATION_DEFAULT_COOLDOWN_SECONDS=${WATCHDOG_NOTIFICATION_DEFAULT_COOLDOWN_SECONDS:-86400}'
      - 'WATCHDOG_FIX_DEFAULT_RETRY_COUNT=${WATCHDOG_FIX_DEFAULT_RETRY_COUNT:-3}'
      - 'WATCHDOG_FIX_DEFAULT_RETRY_DELAY_SECONDS=${WATCHDOG_FIX_DEFAULT_RETRY_DELAY_SECONDS:-60}'
      - 'WATCHDOG_MISSING_PROPERTY_RETRY_COUNT=${WATCHDOG_MISSING_PROPERTY_RETRY_COUNT:-3}'
      - 'WATCHDOG_MISSING_PROPERTY_RETRY_DELAY_SECONDS=${WATCHDOG_MISSING_PROPERTY_RETRY_DELAY_SECONDS:-10}'
      - 'WATCHDOG_STALE_MAINS_SECONDS=${WATCHDOG_STALE_MAINS_SECONDS:-7200}'
      - 'WATCHDOG_STALE_BATTERY_SECONDS=${WATCHDOG_STALE_BATTERY_SECONDS:-86400}'
      - 'WATCHDOG_STALE_CRITICAL_SECONDS=${WATCHDOG_STALE_CRITICAL_SECONDS:-3600}'
    ports:
      - '127.0.0.1:${APP_PORT:-8080}:8080'
    volumes:
      - './logs:/app/logs'
      - './docker-data/data:/app/data'

  postgres:
    image: 'postgres:latest'
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    volumes:
      - './docker-data/postgres:/var/lib/postgresql'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
